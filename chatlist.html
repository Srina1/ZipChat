<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZipChat - Chats</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #08090c;
            --surface: #10131a;
            --surface2:#141820;
            --border:  #1e2336;
            --accent:  #00e5ff;
            --accent2: #6c3fff;
            --text:    #dde3f0;
            --muted:   #4a5270;
            --red:     #ff4560;
            --green:   #1aff8c;
            --mono:    'IBM Plex Mono', monospace;
            --sans:    'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none;
        }

        .app {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px;
            min-height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px 20px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(120deg, var(--accent), var(--accent2));
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        #username-display {
            font-family: var(--mono);
            font-size: 0.68rem;
            color: var(--muted);
            margin-top: 3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .online-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 2.5s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

        .btn-logout {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.65rem;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.18s;
        }
        .btn-logout:hover { border-color: var(--red); color: var(--red); }

        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.82rem;
            outline: none;
            transition: border-color 0.18s;
        }
        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: var(--muted); }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-list::-webkit-scrollbar { width: 3px; }
        .chat-list::-webkit-scrollbar-thumb { background: var(--border); }

        .chat {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            gap: 14px;
        }
        .chat:hover { background: var(--surface2); }
        .chat:active { background: #1a1f2e; }

        .avatar {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent2), #9f6fff);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .chat-info { flex: 1; min-width: 0; }
        .chat-info h3 {
            font-size: 0.92rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chat-info p {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 3px;
        }

        .time {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--muted);
            flex-shrink: 0;
        }

        .unread-badge {
            background: var(--red);
            color: white;
            border-radius: 10px;
            padding: 1px 6px;
            font-family: var(--mono);
            font-size: 0.65rem;
            min-width: 18px;
            text-align: center;
            display: none;
        }

        .enc-footer {
            padding: 10px;
            text-align: center;
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
            letter-spacing: 1px;
        }
        .enc-footer span { color: var(--accent); }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="header-left">
            <h1>⚡ Chats</h1>
            <p id="username-display">Loading...</p>
        </div>
        <div class="header-right">
            <div class="online-dot"></div>
            <button class="btn-logout" onclick="doLogout()">LOGOUT</button>
        </div>
    </div>

    <div class="search-box">
        <input type="text" placeholder="Search chats..." id="search-input">
    </div>

    <div class="chat-list" id="chat-list">
        <div class="chat" onclick="goToChat('public', 'Public Chat', 'P')">
            <div class="avatar">P</div>
            <div class="chat-info">
                <h3>Public Chat <span id="public-unread" class="unread-badge"></span></h3>
                <p>Kyber + AES Post-Quantum Secure</p>
            </div>
            <div class="time">Now</div>
        </div>

        <div class="chat" onclick="goToChat('tech', 'Tech Chat', 'T')">
            <div class="avatar">T</div>
            <div class="chat-info">
                <h3>Tech Chat <span id="tech-unread" class="unread-badge"></span></h3>
                <p>Post-Quantum Cryptography</p>
            </div>
            <div class="time">10:30</div>
        </div>

        <div class="chat" onclick="goToChat('homie', 'Homie', 'H')">
            <div class="avatar" style="background: linear-gradient(135deg,#ff6b6b,#ee5a24)">H</div>
            <div class="chat-info">
                <h3>Homie <span id="homie-unread" class="unread-badge"></span></h3>
                <p>Hello</p>
            </div>
            <div class="time">10:37</div>
        </div>

        <div class="chat" onclick="goToChat('college', 'College', 'C')">
            <div class="avatar" style="background: linear-gradient(135deg,#f9ca24,#f0932b)">C</div>
            <div class="chat-info">
                <h3>College <span id="college-unread" class="unread-badge"></span></h3>
                <p>Mail</p>
            </div>
            <div class="time">4:29</div>
        </div>

        <div class="chat" onclick="goToChat('john', 'John', 'J')">
            <div class="avatar" style="background: linear-gradient(135deg,#6ab04c,#1e8449)">J</div>
            <div class="chat-info">
                <h3>John <span id="john-unread" class="unread-badge"></span></h3>
                <p>Hi</p>
            </div>
            <div class="time">8:30</div>
        </div>

        <div class="chat" onclick="goToChat('fun', 'Fun', 'F')">
            <div class="avatar" style="background: linear-gradient(135deg,#e056fd,#7d3c98)">F</div>
            <div class="chat-info">
                <h3>Fun <span id="fun-unread" class="unread-badge"></span></h3>
                <p>Haha</p>
            </div>
            <div class="time">1:30</div>
        </div>

        <div class="chat" onclick="goToChat('security', 'Security Chat', 'S')">
            <div class="avatar">S</div>
            <div class="chat-info">
                <h3>Security Chat <span id="security-unread" class="unread-badge"></span></h3>
                <p>E2EE Demo Active</p>
            </div>
            <div class="time">5:23</div>
        </div>
    </div>

    <div class="enc-footer">🔐 <span>KYBER + AES-256-GCM</span> · ALL CHATS END-TO-END ENCRYPTED</div>
</div>

<script>
// FIX: Single token check, redirect to index.html (not welcome.html)
const token       = localStorage.getItem('zipchat_token');
const username    = localStorage.getItem('zipchat_username') || 'Guest';
const displayName = localStorage.getItem('zipchat_display_name') || username;

if (!token) {
    window.location.href = 'index.html';
}

document.getElementById('username-display').textContent = `${displayName}  ·  @${username}`;

document.getElementById('search-input').addEventListener('input', function () {
    const term = this.value.toLowerCase();
    document.querySelectorAll('.chat').forEach(chat => {
        const title = chat.querySelector('h3').textContent.toLowerCase();
        const desc  = chat.querySelector('p').textContent.toLowerCase();
        chat.style.display = (title.includes(term) || desc.includes(term)) ? 'flex' : 'none';
    });
});

function goToChat(chatId, name, avatar) {
    const badge = document.getElementById(chatId + '-unread');
    if (badge) { badge.textContent = ''; badge.style.display = 'none'; }
    const params = new URLSearchParams({ chat: chatId, name, avatar });
    window.location.href = `msgpage.html?${params}`;
}

function doLogout() {
    localStorage.removeItem('zipchat_token');
    localStorage.removeItem('zipchat_temp_token');
    localStorage.removeItem('zipchat_username');
    localStorage.removeItem('zipchat_display_name');
    window.location.href = 'index.html';
}
</script>
</body>
</html>
