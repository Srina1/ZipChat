<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZipChat</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #f0f4ff;
            --surface: #ffffff;
            --border:  #dde3f8;
            --accent:  #4f46e5;
            --accent2: #7c3aed;
            --accent3: #06b6d4;
            --text:    #1e1b4b;
            --muted:   #6b7280;
            --red:     #ef4444;
            --green:   #10b981;
            --mono:    'IBM Plex Mono', monospace;
            --sans:    'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(79,70,229,0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(124,58,237,0.10) 0%, transparent 50%),
                radial-gradient(circle at 60% 10%, rgba(6,182,212,0.08) 0%, transparent 40%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(79,70,229,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79,70,229,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .welcome-container {
            position: relative; z-index: 1;
            width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 56px 36px 36px;
            box-shadow: 0 20px 60px rgba(79,70,229,0.12), 0 4px 16px rgba(0,0,0,0.06);
            animation: rise 0.5s cubic-bezier(.16,1,.3,1);
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 46px; height: 46px;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            font-size: 1.4rem;
            flex-shrink: 0;
            box-shadow: 0 8px 24px rgba(79,70,229,0.3);
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(120deg, var(--accent), var(--accent2), var(--accent3));
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            text-align: center;
            font-family: var(--mono);
            font-size: 0.62rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tagline-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        .tabs {
            display: flex; gap: 4px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab {
            flex: 1; text-align: center;
            padding: 9px 0;
            border-radius: 9px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--muted);
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--surface);
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(79,70,229,0.15);
        }

        .banner {
            border-radius: 10px;
            padding: 10px 14px;
            font-family: var(--mono);
            font-size: 0.75rem;
            margin-bottom: 14px;
            display: none;
        }

        .banner.error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.25);
            color: #dc2626;
        }

        .banner.info {
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.25);
            color: #059669;
        }

        .banner.show { display: block; }

        .field { margin-bottom: 14px; }

        .field label {
            display: block;
            font-family: var(--mono);
            font-size: 0.62rem;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .field input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
            background: #fff;
        }

        .field input::placeholder { color: #b0b7c9; }

        .startBtn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin-top: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: 0 4px 16px rgba(79,70,229,0.3);
        }

        .startBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79,70,229,0.4);
        }

        .startBtn:active:not(:disabled) {
            transform: translateY(0);
        }

        .startBtn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

    
    </style>
</head>
<body>
<div class="welcome-container">
    <div class="logo-wrap">
        <div class="logo-icon">⚡</div>
        <div class="logo">ZipChat</div>
    </div>

    <div class="tagline">
        <div class="tagline-dot"></div>
        Post-Quantum · E2E Encrypted
    </div>


    <div class="tabs">
        <div class="tab active" id="tab-login" onclick="switchTab('login')">LOGIN</div>
        <div class="tab" id="tab-register" onclick="switchTab('register')">REGISTER</div>
    </div>

    <div id="banner" class="banner error"></div>

    <div id="form-login">
        <div class="field">
            <label>Username</label>
            <input id="login-username" type="text" placeholder="your_username" autocomplete="username">
        </div>
        <div class="field">
            <label>Password</label>
            <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password"
                   onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <button class="startBtn" id="btn-login" onclick="doLogin()">LOGIN →</button>
    </div>

    <div id="form-register" style="display:none">
        <div class="field">
            <label>Username</label>
            <input id="reg-username" type="text" placeholder="choose_username" autocomplete="username">
        </div>
        <div class="field">
            <label>Display Name</label>
            <input id="reg-displayname" type="text" placeholder="Your Name">
        </div>
        <div class="field">
            <label>Password</label>
            <input id="reg-password" type="password" placeholder="••••••••" autocomplete="new-password"
                   onkeydown="if(event.key==='Enter') doRegister()">
        </div>
        <button class="startBtn" id="btn-register" onclick="doRegister()">CREATE ACCOUNT →</button>
    </div>

  
</div>

<script>
const AUTH = 'http://localhost:3000';

function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
    hideBanner();
}

function showBanner(msg, type = 'error') {
    const el = document.getElementById('banner');
    el.textContent = msg;
    el.className = `banner ${type} show`;
}
function hideBanner() {
    document.getElementById('banner').classList.remove('show');
}

async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) return showBanner('Enter username and password.');

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'CHECKING...';

    try {
        const res = await fetch(`${AUTH}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (!res.ok) return showBanner(await res.text());

        const data = await res.json();
        localStorage.setItem('zipchat_username', username);
        localStorage.setItem('zipchat_temp_token', data.tempToken);

        await fetch(`${AUTH}/send-otp`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${data.tempToken}`
            },
            body: JSON.stringify({ username })
        });

        window.location.href = 'otp.html';

    } catch {
        showBanner('Cannot reach auth server. Is auth_server.py running on port 3000?');
    } finally {
        btn.disabled = false;
        btn.textContent = 'LOGIN →';
    }
}

async function doRegister() {
    const username    = document.getElementById('reg-username').value.trim();
    const displayName = document.getElementById('reg-displayname').value.trim();
    const password    = document.getElementById('reg-password').value;

    if (!username || !password) return showBanner('Username and password required.');

    const btn = document.getElementById('btn-register');
    btn.disabled = true;
    btn.textContent = 'CREATING...';

    try {
        const res = await fetch(`${AUTH}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, displayName })
        });

        if (!res.ok) return showBanner(await res.text());

        showBanner('✓ Account created! You can now log in.', 'info');
        switchTab('login');
        document.getElementById('login-username').value = username;

    } catch {
        showBanner('Cannot reach auth server.');
    } finally {
        btn.disabled = false;
        btn.textContent = 'CREATE ACCOUNT →';
    }
}

(async () => {
    const token = localStorage.getItem('zipchat_token');
    if (!token) return;
    try {
        const res = await fetch(`${AUTH}/verify-token`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token })
        });
        const d = await res.json();
        if (d.valid) {
            window.location.href = 'chatlist.html';
        } else {
            // Token is invalid/expired — clear everything and stay on login
            localStorage.removeItem('zipchat_token');
            localStorage.removeItem('zipchat_temp_token');
            localStorage.removeItem('zipchat_username');
            localStorage.removeItem('zipchat_display_name');
        }
    } catch {
        // Auth server unreachable — clear token, stay on login page
        localStorage.removeItem('zipchat_token');
        localStorage.removeItem('zipchat_temp_token');
        localStorage.removeItem('zipchat_username');
        localStorage.removeItem('zipchat_display_name');
    }
})();
</script>
</body>
</html>
