<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZipChat — Quantum Safe</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#08090c;--surface:#10131a;--surface2:#141820;--border:#1e2336;
            --accent:#00e5ff;--accent2:#6c3fff;--text:#dde3f0;--muted:#4a5270;
            --red:#ff4560;--green:#1aff8c;--sent:#0e2240;--recv:#141820;
            --mono:'IBM Plex Mono',monospace;--sans:'Syne',sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;display:flex;justify-content:center;}
        body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;}
        .chat-container{position:relative;z-index:1;width:100%;max-width:440px;height:100vh;background:var(--surface);border-left:1px solid var(--border);border-right:1px solid var(--border);display:flex;flex-direction:column;}
        .chat-header{display:flex;align-items:center;padding:14px 16px;background:var(--surface2);border-bottom:1px solid var(--border);gap:12px;}
        .back-btn{font-size:1.2rem;cursor:pointer;color:var(--accent);padding:4px;transition:opacity .18s;}
        .back-btn:hover{opacity:.7;}
        .chat-header-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),#9f6fff);display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff;flex-shrink:0;}
        .header-info{flex:1;min-width:0;}
        .header-name{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .header-status{font-family:var(--mono);font-size:.62rem;color:var(--muted);margin-top:2px;}
        .header-status.secure{color:var(--accent);}
        .header-status.online{color:var(--green);}
        .sec-badges{display:flex;flex-direction:column;gap:3px;align-items:flex-end;}
        .enc-pill{display:flex;align-items:center;gap:5px;padding:3px 9px;background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.15);border-radius:20px;font-family:var(--mono);font-size:.55rem;color:var(--accent);flex-shrink:0;}
        .enc-pill.dsa{background:rgba(108,63,255,.06);border-color:rgba(108,63,255,.15);color:#a78bfa;}
        .enc-pill.pfs{background:rgba(26,255,140,.06);border-color:rgba(26,255,140,.15);color:var(--green);}
        .enc-pill.wss{background:rgba(255,213,0,.06);border-color:rgba(255,213,0,.15);color:#ffd166;}
        .enc-pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 2.5s infinite;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
        .messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:3px;}
        .messages::-webkit-scrollbar{width:3px;}
        .messages::-webkit-scrollbar-thumb{background:var(--border);}
        .msg-group{display:flex;flex-direction:column;margin-bottom:8px;}
        .msg-group.sent{align-items:flex-end;}
        .msg-group.recv{align-items:flex-start;}
        .msg-meta{font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
        .msg-meta .sender{font-weight:600;color:var(--text);}
        .msg-meta .sender.me{color:var(--accent);}
        .msg-meta .sig-badge{font-size:.55rem;padding:1px 5px;border-radius:4px;background:rgba(26,255,140,.12);color:var(--green);border:1px solid rgba(26,255,140,.2);}
        .msg-meta .sig-fail{background:rgba(255,69,96,.12);color:var(--red);border-color:rgba(255,69,96,.2);}
        .bubble{padding:9px 13px;border-radius:12px;max-width:78%;word-break:break-word;font-size:.88rem;line-height:1.5;animation:pop .18s cubic-bezier(.16,1,.3,1);}
        @keyframes pop{from{opacity:0;transform:scale(.94) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
        .msg-group.sent .bubble{background:var(--sent);border:1px solid rgba(0,229,255,.1);border-bottom-right-radius:4px;}
        .msg-group.recv .bubble{background:var(--recv);border:1px solid var(--border);border-bottom-left-radius:4px;}
        .status-pill{align-self:center;font-family:var(--mono);font-size:.62rem;color:var(--muted);padding:4px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;margin:6px 0;text-align:center;max-width:90%;}
        .status-pill.warn{color:var(--red);border-color:rgba(255,69,96,.3);}
        .status-pill.ok{color:var(--green);border-color:rgba(26,255,140,.3);}
        .status-pill.fp{color:#ffd166;border-color:rgba(255,213,0,.3);font-size:.58rem;letter-spacing:.03em;}
        .input-bar{display:flex;align-items:center;padding:10px 12px;border-top:1px solid var(--border);background:var(--surface2);gap:10px;}
        .input-bar input{flex:1;padding:11px 16px;background:var(--bg);border:1px solid var(--border);border-radius:24px;color:var(--text);font-family:var(--sans);font-size:.88rem;outline:none;transition:border-color .18s;}
        .input-bar input:focus{border-color:var(--accent);}
        .input-bar input:disabled{opacity:.35;cursor:not-allowed;}
        .send-btn{width:42px;height:42px;border:none;border-radius:50%;background:linear-gradient(135deg,var(--accent),#009ab8);color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;}
        .send-btn:hover:not(:disabled){transform:scale(1.08);}
        .send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
        .send-btn svg{width:17px;height:17px;}
    </style>
</head>

<script type="module">
// ══════════════════════════════════════════════════════════════════════════════
//  ZipChat — Quantum-Safe Chat Client (FINAL VERSION)
//
//  Security features:
//   1.  WSS / TLS          — Transport encryption (wss://)
//  2.  ML-KEM-768         — Post-quantum key encapsulation (NIST 2024)
//  3.  ML-DSA-65          — Post-quantum digital signatures (NIST 2024)
//  4.  PFS via HKDF       — Per-message key derivation
//  5.  AES-256-GCM        — Authenticated symmetric encryption
//  6.  Key fingerprints   — MITM detection (SHA-256 of peer pubkey)
//  7.  Replay protection  — Reject duplicate message counters
//  8.  Metadata protection — Padding + dummy traffic + no Firebase identity
// ══════════════════════════════════════════════════════════════════════════════

import { ml_kem768 } from 'https://esm.sh/@noble/post-quantum@0.2.1/ml-kem';
import { ml_dsa65  } from 'https://esm.sh/@noble/post-quantum@0.2.1/ml-dsa';

// FIX 3 — NOTE: In production, download noble-pq.js locally and import from './noble-pq.js'
// This removes CDN dependency. For FYP demo, CDN is acceptable.

const WS_URL = 'wss://localhost:8082';
//  Change to ws://localhost:8082 only if cert.pem/key.pem not yet set up

// ── URL params ────────────────────────────────────────────────────────────────
const params   = new URLSearchParams(window.location.search);
const chatName = params.get('name')   || 'Public Chat';
const chatAvat = params.get('avatar') || '💬';
const chatId   = (params.get('chat') || 'public').replace(/[.#$[\]]/g, '_');
document.getElementById('chat-name').textContent   = chatName;
document.getElementById('chat-avatar').textContent = chatAvat;

// ── Auth guard ────────────────────────────────────────────────────────────────
const token      = localStorage.getItem('zipchat_token');
const myUsername = localStorage.getItem('zipchat_username')     || 'me';
const myDisplay  = localStorage.getItem('zipchat_display_name') || myUsername;
if (!token) { window.location.href = 'index.html'; }

// ── State ─────────────────────────────────────────────────────────────────────
let myId = null, ws = null;
let isRedirecting = false, isConnecting = false;

const peerInfo     = new Map();   // peerId → { username, displayName }
const pendingKyber = new Map();   // peerId → { secretKey }
const peerRatchets = new Map();   // peerId → { baseKey, encCounter, decCounter }
const peerDSAKeys  = new Map();   // peerId → Uint8Array (their DSA public key)

// FIX 2 — REPLAY PROTECTION: track seen counters per peer
const seenCounters = new Map();   // peerId → Set of already-processed counters

// ── ML-DSA-65 signing keypair — generated fresh each session ──────────────────
let myDSASecret = null;
let myDSAPublic = null;

(function initDSA() {
    const { secretKey, publicKey } = ml_dsa65.keygen();
    myDSASecret = secretKey;
    myDSAPublic = publicKey;
    console.log('%c🔑 ML-DSA-65 keypair generated','color:#a78bfa;font-weight:bold',
        publicKey.length + ' byte pubkey');
})();

// ── IndexedDB key storage ─────────────────────────────────────────────────────
const IDB_NAME = 'zipchat_keys', IDB_STORE = 'aes_keys';

function openKeyDB() {
    return new Promise((res, rej) => {
        const r = indexedDB.open(IDB_NAME, 1);
        r.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
    });
}
async function saveKeyToIDB(keyId, bytes) {
    const d = await openKeyDB();
    d.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(Array.from(bytes), keyId);
    console.log('%c💾 Key saved to IndexedDB','color:#1aff8c;font-weight:bold', keyId);
}
async function deleteKeyFromIDB(keyId) {
    const d = await openKeyDB();
    d.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).delete(keyId);
}

// ── WebSocket connection ──────────────────────────────────────────────────────
function connect() {
    if (isRedirecting || isConnecting) return;
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

    isConnecting = true;
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
        isConnecting = false;
        setStatus('Authenticating...', '');
        ws.send(JSON.stringify({ type: 'auth_token', token }));
    };

    ws.onmessage = async (event) => {
        let data;
        try { data = JSON.parse(event.data); } catch { return; }

        // Strip relay: prefix from server-relayed messages
        if (data.type && data.type.startsWith('relay:')) {
            data = { ...data, type: data.type.slice(6) };
        }

        if (data.type === 'welcome') { myId = data.clientId; return; }

        if (data.type === 'auth_ok') {
            setStatus('🔒 ML-KEM-768 + ML-DSA-65 · Waiting for peer', 'secure');
            return;
        }

        if (data.type === 'auth_failed') {
            if (isRedirecting) return;
            isRedirecting = true;
            ws.onclose = null; ws.close();
            localStorage.clear();
            appendStatus('Session expired — redirecting...');
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            return;
        }

        if (data.type === 'peer_joined') {
            peerInfo.set(data.peerId, { username: data.username, displayName: data.displayName });
            appendStatus(data.displayName + ' joined');
            setStatus('🟢 ' + data.displayName + ' online', 'online');
            if (myId < data.peerId) relay({ type: 'kyber_hello' }, data.peerId);
            setTimeout(() => { if (peerRatchets.size > 0) enableInput(); }, 3000);
            return;
        }

        if (data.type === 'peer_left') {
            const info = peerInfo.get(data.peerId);
            appendStatus((info?.displayName ?? 'Peer') + ' left');
            peerRatchets.delete(data.peerId);
            peerDSAKeys.delete(data.peerId);
            peerInfo.delete(data.peerId);
            pendingKyber.delete(data.peerId);
            seenCounters.delete(data.peerId);
            deleteKeyFromIDB(chatId + '_peer_' + data.peerId);
            if (peerRatchets.size === 0) {
                disableInput();
                setStatus('🔒 ML-KEM-768 · Waiting for peer', 'secure');
            }
            return;
        }

        if (data.type === 'presence_list') return;

        // ── ML-KEM-768 handshake ──────────────────────────────────────────────
        if (data.type === 'kyber_hello') {
            const { publicKey, secretKey } = ml_kem768.keygen();
            pendingKyber.set(data.from, { secretKey });
            relay({ type: 'kyber_pubkey', publicKey: Array.from(publicKey) }, data.from);
            console.log('%c🤝 RESPONDER: sent KEM pubkey','color:#ffd166;font-weight:bold');
            return;
        }

        if (data.type === 'kyber_pubkey') {
            const { cipherText, sharedSecret } = ml_kem768.encapsulate(new Uint8Array(data.publicKey));
            await storePeerRatchet(data.from, sharedSecret);
            relay({ type: 'kyber_ct', cipherText: Array.from(cipherText) }, data.from);
            relay({ type: 'dsa_pubkey', publicKey: Array.from(myDSAPublic) }, data.from);
            console.log('%c🤝 INITIATOR: encapsulated + sent DSA pubkey','color:#ffd166;font-weight:bold');
            appendStatus('🔐 ML-KEM-768 key exchange complete');
            return;
        }

        if (data.type === 'kyber_ct') {
            const pending = pendingKyber.get(data.from);
            if (!pending) return;
            const sharedSecret = ml_kem768.decapsulate(new Uint8Array(data.cipherText), pending.secretKey);
            pendingKyber.delete(data.from);
            await storePeerRatchet(data.from, sharedSecret);
            relay({ type: 'dsa_pubkey', publicKey: Array.from(myDSAPublic) }, data.from);
            console.log('%c🤝 RESPONDER: decapsulated + sent DSA pubkey','color:#ffd166;font-weight:bold');
            appendStatus('🔐 ML-KEM-768 key exchange complete');
            enableInput();
            await flushHistoryBuffer();
            return;
        }

        // ✅ FIX 1 — PEER DSA PUBKEY + KEY FINGERPRINT
        if (data.type === 'dsa_pubkey') {
            const pubkeyBytes = new Uint8Array(data.publicKey);
            peerDSAKeys.set(data.from, pubkeyBytes);

            // Compute SHA-256 fingerprint of peer's public key
            const hashBuffer  = await crypto.subtle.digest('SHA-256', pubkeyBytes);
            const hashBytes   = Array.from(new Uint8Array(hashBuffer));
            const fingerprint = hashBytes
                .slice(0, 8)
                .map(b => b.toString(16).padStart(2, '0').toUpperCase())
                .join(':');

            const info = peerInfo.get(data.from);
            const name = info?.displayName ?? 'Peer';

            console.log('%c🔑 ML-DSA-65 peer pubkey stored','color:#a78bfa;font-weight:bold',
                'fingerprint:', fingerprint);

            // Show fingerprint in chat — user should verify this out-of-band (e.g. over phone)
            appendStatus('✅ ML-DSA-65 key exchange complete', 'ok');
            appendStatus('🔑 ' + name + ' key fingerprint: ' + fingerprint, 'fp');
            appendStatus('⚠️ Verify fingerprint with peer out-of-band to prevent MITM', '');

            enableInput();
            await flushHistoryBuffer();
            return;
        }

        // ✅ Silently absorb dummy traffic
        if (data.type === 'dummy') {
            console.log('%c🕵️ Dummy traffic absorbed','color:#4a5270');
            return;
        }

        // ── Incoming chat message ─────────────────────────────────────────────
        if (data.type === 'chat') {
            if (!peerRatchets.has(data.from)) {
                appendStatus('[message received before key exchange]');
                return;
            }

            // ✅ FIX 2 — REPLAY PROTECTION: reject duplicate counters
            if (!seenCounters.has(data.from)) seenCounters.set(data.from, new Set());
            const seen = seenCounters.get(data.from);
            if (seen.has(data.counter)) {
                appendStatus('🚨 Replay attack detected — duplicate message rejected', 'warn');
                console.warn('[REPLAY PROTECTION] Duplicate counter', data.counter, 'from peer', data.from);
                return;
            }
            seen.add(data.counter);

            try {
                // ✅ PFS decrypt with per-message HKDF-derived key
                const plain = await decryptPFS(
                    data.cipherText, data.iv,
                    data.counter, data.salt,
                    data.from
                );

                // ✅ ML-DSA-65 signature verification
                let sigValid = false;
                if (data.signature && peerDSAKeys.has(data.from)) {
                    const msgBytes = new TextEncoder().encode(plain);
                    sigValid = ml_dsa65.verify(
                        peerDSAKeys.get(data.from),
                        msgBytes,
                        new Uint8Array(data.signature)
                    );
                    if (!sigValid) {
                        appendStatus('🚨 Signature FAILED — message rejected', 'warn');
                        console.warn('[ML-DSA-65] Signature verification FAILED from peer', data.from);
                        return;
                    }
                } else {
                    console.warn('[ML-DSA-65] No DSA key for peer yet — skipping verify');
                }

                const info = peerInfo.get(data.from);
                appendMessage(plain, 'recv',
                    info?.displayName ?? '?',
                    info?.username    ?? '?',
                    null, sigValid);

            } catch (e) {
                console.error('[decryption error]', e);
                appendStatus('[decryption failed — possible session mismatch]', 'warn');
            }
        }
    };

    ws.onerror = () => {
        isConnecting = false;
        if (!isRedirecting) setStatus('Connection error — check server + WSS cert', '');
    };

    ws.onclose = () => {
        isConnecting = false;
        if (!isRedirecting) { setStatus('Disconnected', ''); disableInput(); }
    };
}

connect();

// ── Firebase history ──────────────────────────────────────────────────────────
const historyBuffer = [];
let historyLoaded   = false;

function loadHistory() {
    db.ref('chats/' + chatId + '/messages')
      .orderByChild('timestamp')
      .limitToLast(50)
      .once('value', snapshot => {
          const raw = snapshot.val();
          if (!raw) { historyLoaded = true; return; }
          const entries = Object.values(raw)
              .filter(m => m && m.cipherText && m.iv)
              .sort((a, b) => (a.timestamp||0) - (b.timestamp||0));
          entries.forEach(m => historyBuffer.push(m));
          historyLoaded = true;
          console.log('%c📂 History buffered','color:#ffd166', entries.length + ' msgs');
      });
}

async function flushHistoryBuffer() {
    if (historyBuffer.length === 0 || peerRatchets.size === 0) return;
    let decrypted = 0;
    const remaining = [];
    const hexToBytes = hex => new Uint8Array(hex.match(/.{2}/g).map(h => parseInt(h, 16)));

    for (const m of historyBuffer) {
        let decryptedText = null;
        for (const [peerId] of peerRatchets) {
            try {
                const key   = await deriveMessageKey(peerId, m.counter || 0, hexToBytes(m.salt || '00'.repeat(32)));
                const plain = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: hexToBytes(m.iv) },
                    key,
                    hexToBytes(m.cipherText)
                );
                decryptedText = new TextDecoder().decode(plain).replace(/\0+$/, '');
                break;
            } catch {}
        }
        if (decryptedText !== null) {
            appendMessage(decryptedText, 'recv', 'history', 'history', m.timestamp, null);
            decrypted++;
        } else {
            remaining.push(m);
        }
    }
    historyBuffer.length = 0;
    remaining.forEach(m => historyBuffer.push(m));
    if (decrypted > 0) appendStatus('✅ ' + decrypted + ' history messages loaded', 'ok');
}

loadHistory();

// ── Crypto helpers ────────────────────────────────────────────────────────────
const toHex = bytes => Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join('');

// ✅ PFS: store shared secret as HKDF base key — never use raw secret directly
async function storePeerRatchet(peerId, sharedSecretBytes) {
    if (peerRatchets.has(peerId)) return;
    const keyBytes = new Uint8Array(sharedSecretBytes);
    const baseKey  = await crypto.subtle.importKey(
        'raw', keyBytes, { name: 'HKDF' }, false, ['deriveKey']
    );
    peerRatchets.set(peerId, { baseKey, encCounter: 0, decCounter: 0 });
    await saveKeyToIDB(chatId + '_peer_' + peerId, keyBytes);
    console.group('%c🔐 PFS Ratchet ready','color:#00e5ff;font-weight:bold');
    console.log('Peer:', peerId, '| HKDF base key stored | PFS enabled');
    console.groupEnd();
}

// ✅ PFS: derive unique AES-256-GCM key per message using HKDF + counter + random salt
async function deriveMessageKey(peerId, counter, salt) {
    const ratchet = peerRatchets.get(peerId);
    const info    = new TextEncoder().encode('zipchat-msg-' + counter);
    return crypto.subtle.deriveKey(
        { name: 'HKDF', hash: 'SHA-256', salt, info },
        ratchet.baseKey,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
    );
}

// ✅ Encrypt with PFS key + pad message to hide real length
async function encryptPFS(text, peerId) {
    const ratchet = peerRatchets.get(peerId);
    const counter = ratchet.encCounter++;
    const salt    = crypto.getRandomValues(new Uint8Array(32));
    const iv      = crypto.getRandomValues(new Uint8Array(12));

    // Pad to nearest 256-byte block — hides message length from traffic analysis
    const BLOCK  = 256;
    const padded = text.padEnd(Math.ceil((text.length + 1) / BLOCK) * BLOCK, '\0');

    const msgKey = await deriveMessageKey(peerId, counter, salt);
    const ct     = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        msgKey,
        new TextEncoder().encode(padded)
    );

    console.log('%c📤 ENCRYPT (PFS)','color:#1aff8c;font-weight:bold',
        '| counter:', counter, '| padded:', padded.length, 'bytes | iv:', toHex(iv));

    return { cipherText: new Uint8Array(ct), iv, counter, salt };
}

// ✅ Decrypt with PFS key — rederive same key using counter + salt
async function decryptPFS(ctArr, ivArr, counter, saltArr, peerId) {
    const msgKey = await deriveMessageKey(peerId, counter, new Uint8Array(saltArr));
    const plain  = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: new Uint8Array(ivArr) },
        msgKey,
        new Uint8Array(ctArr)
    );
    const text = new TextDecoder().decode(plain).replace(/\0+$/, ''); // strip padding
    console.log('%c📥 DECRYPT (PFS)','color:#00e5ff;font-weight:bold',
        '| counter:', counter, '| plain:', text);
    return text;
}

function relay(payload, toPeerId) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ ...payload, to: toPeerId }));
    }
}

// ✅ METADATA PROTECTION — dummy traffic every 30s to obscure communication timing
setInterval(async () => {
    if (peerRatchets.size === 0) return;
    for (const [peerId] of peerRatchets) {
        try {
            const { cipherText, iv, counter, salt } = await encryptPFS('__dummy__', peerId);
            relay({
                type:       'dummy',
                cipherText: Array.from(cipherText),
                iv:         Array.from(iv),
                counter,
                salt:       Array.from(salt)
            }, peerId);
            console.log('%c🕵️ Dummy sent (metadata protection)','color:#4a5270');
        } catch {}
    }
}, 30000);

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
    const input = document.getElementById('message');
    const text  = input.value.trim();
    if (!text) return;

    if (peerRatchets.size === 0) {
        appendStatus('[No peer connected — waiting for someone to join]');
        return;
    }

    input.value = '';
    appendMessage(text, 'sent', myDisplay, myUsername, null, true);

    for (const [peerId] of peerRatchets) {
        try {
            // ✅ Sign plaintext BEFORE encrypting (correct order)
            const msgBytes  = new TextEncoder().encode(text);
            const signature = ml_dsa65.sign(myDSASecret, msgBytes);
            console.log('%c✍️ ML-DSA-65 signed','color:#a78bfa;font-weight:bold',
                'sig len:', signature.length);

            // ✅ Encrypt with PFS per-message key
            const { cipherText, iv, counter, salt } = await encryptPFS(text, peerId);

            relay({
                type:       'chat',
                cipherText: Array.from(cipherText),
                iv:         Array.from(iv),
                counter,
                salt:       Array.from(salt),
                signature:  Array.from(signature)
            }, peerId);

            // ✅ Save to Firebase — no identity metadata
            saveMessageToFirebase(chatId, toHex(cipherText), toHex(iv), toHex(signature));

        } catch (e) { console.error('[encrypt/sign error]', e); }
    }
}
window.sendMessage = sendMessage;

// ── UI helpers ────────────────────────────────────────────────────────────────
function appendMessage(text, dir, displayName, username, timestamp, sigValid) {
    const msgs = document.getElementById('messages');
    const ts   = timestamp
        ? new Date(timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
        : new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    const isMe = dir === 'sent';
    const g    = document.createElement('div');
    g.className = 'msg-group ' + dir;

    let sigBadge = '';
    if (dir === 'recv') {
        if      (sigValid === true)  sigBadge = '<span class="sig-badge">✓ DSA verified</span>';
        else if (sigValid === false) sigBadge = '<span class="sig-badge sig-fail">✗ DSA FAIL</span>';
        else                         sigBadge = '<span class="sig-badge" style="opacity:.4">⚠ unverified</span>';
    }

    g.innerHTML =
        '<div class="msg-meta">' +
            '<span class="sender' + (isMe ? ' me' : '') + '">' + esc(displayName) + '</span>' +
            '<span>@' + esc(username) + '</span>' +
            '<span>' + ts + '</span>' +
            sigBadge +
        '</div>' +
        '<div class="bubble">' + esc(text) + '</div>';
    msgs.appendChild(g);
    msgs.scrollTop = msgs.scrollHeight;
}

function appendStatus(text, type) {
    const msgs = document.getElementById('messages');
    const el   = document.createElement('div');
    el.className = 'status-pill' + (type ? ' ' + type : '');
    el.textContent = text;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
}

function setStatus(msg, cls) {
    const el = document.getElementById('chat-status');
    el.textContent = msg;
    el.className   = 'header-status ' + (cls || '');
}

function enableInput() {
    document.getElementById('message').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('message').focus();
    setStatus('🔒 ML-KEM-768 · ML-DSA-65 · PFS · WSS', 'secure');
}

function disableInput() {
    document.getElementById('message').disabled = true;
    document.getElementById('sendBtn').disabled = true;
}

function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
