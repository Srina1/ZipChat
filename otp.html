<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZipChat — Verify OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #f0f4ff;
            --surface: #ffffff;
            --border:  #dde3f8;
            --accent:  #4f46e5;
            --accent2: #7c3aed;
            --accent3: #06b6d4;
            --text:    #1e1b4b;
            --muted:   #6b7280;
            --red:     #ef4444;
            --yellow:  #d97706;
            --mono:    'IBM Plex Mono', monospace;
            --sans:    'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(79,70,229,0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(124,58,237,0.10) 0%, transparent 50%),
                radial-gradient(circle at 60% 10%, rgba(6,182,212,0.08) 0%, transparent 40%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(79,70,229,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79,70,229,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .card {
            position: relative; z-index: 1;
            width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 36px 36px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(79,70,229,0.12), 0 4px 16px rgba(0,0,0,0.06);
            animation: rise 0.5s cubic-bezier(.16,1,.3,1);
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo row — same as index.html */
        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 46px; height: 46px;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            font-size: 1.4rem;
            flex-shrink: 0;
            box-shadow: 0 8px 24px rgba(79,70,229,0.3);
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(120deg, var(--accent), var(--accent2), var(--accent3));
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Shield badge */
        .shield-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .shield-icon {
            width: 64px; height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(79,70,229,0.1), rgba(124,58,237,0.1));
            border: 1.5px solid rgba(79,70,229,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 14px;
        }

        h2 {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
        }

        .desc {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 6px;
        }

        .desc span {
            color: var(--accent);
            font-weight: 600;
        }

        .user-hint {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--yellow);
            font-weight: 600;
            background: rgba(217,119,6,0.08);
            border: 1px solid rgba(217,119,6,0.2);
            border-radius: 20px;
            padding: 4px 12px;
            margin-bottom: 24px;
        }

        /* OTP boxes */
        .otp-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 22px;
        }

        .otp-row input {
            width: 50px;
            height: 58px;
            text-align: center;
            font-family: var(--mono);
            font-size: 1.6rem;
            font-weight: 700;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--accent);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .otp-row input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
            background: #fff;
        }

        .otp-row input:not(:placeholder-shown) {
            background: rgba(79,70,229,0.05);
            border-color: rgba(79,70,229,0.3);
        }

        /* Divider between groups of 3 */
        .otp-divider {
            display: flex;
            align-items: center;
            color: #b0b7c9;
            font-size: 1.2rem;
            font-weight: 300;
            padding-bottom: 2px;
        }

        /* Banner */
        .banner {
            border-radius: 10px;
            padding: 10px 14px;
            font-family: var(--mono);
            font-size: 0.74rem;
            margin-bottom: 14px;
            display: none;
            text-align: left;
        }
        .banner.error {
            background: rgba(239,68,68,0.07);
            border: 1px solid rgba(239,68,68,0.22);
            color: #dc2626;
        }
        .banner.show { display: block; }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.2s;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: 0 4px 16px rgba(79,70,229,0.3);
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79,70,229,0.4);
        }
        .btn:active:not(:disabled) { transform: translateY(0); }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-back {
            width: 100%;
            padding: 11px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-back:hover {
            border-color: rgba(79,70,229,0.3);
            color: var(--accent);
            background: rgba(79,70,229,0.04);
        }

        /* Security note */
        .sec-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            font-family: var(--mono);
            font-size: 0.6rem;
            color: #b0b7c9;
            letter-spacing: 0.5px;
        }

        .sec-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--green, #10b981);
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        .footer {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: #b0b7c9;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="card">

    <!-- Logo — matches index.html -->
    <div class="logo-row">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">ZipChat</div>
    </div>

    <!-- Shield + heading -->
    <div class="shield-wrap">
        <div class="shield-icon">🔐</div>
        <h2>MFA</h2>
        

    <div class="user-hint" id="user-hint">Loading...</div>

    <div id="banner" class="banner error"></div>

    <!-- OTP inputs with visual divider -->
    <div class="otp-row" id="otp-row">
        <input type="text" maxlength="1" inputmode="numeric" placeholder="·"
               onkeydown="otpKey(event,0)" oninput="otpInput(event,0)">
        <input type="text" maxlength="1" inputmode="numeric" placeholder="·"
               onkeydown="otpKey(event,1)" oninput="otpInput(event,1)">
        <input type="text" maxlength="1" inputmode="numeric" placeholder="·"
               onkeydown="otpKey(event,2)" oninput="otpInput(event,2)">
        <div class="otp-divider">—</div>
        <input type="text" maxlength="1" inputmode="numeric" placeholder="·"
               onkeydown="otpKey(event,3)" oninput="otpInput(event,3)">
        <input type="text" maxlength="1" inputmode="numeric" placeholder="·"
               onkeydown="otpKey(event,4)" oninput="otpInput(event,4)">
        <input type="text" maxlength="1" inputmode="numeric" placeholder="·"
               onkeydown="otpKey(event,5)" oninput="otpInput(event,5)">
    </div>

    <button class="btn" id="btn-verify" onclick="verifyOtp()">VERIFY →</button>
    <button class="btn-back" onclick="window.location.href='index.html'">← BACK TO LOGIN</button>


    
</div>

<script>
const AUTH     = 'http://localhost:3000';
const username = localStorage.getItem('zipchat_username') || '';

document.getElementById('user-hint').textContent = username ? `Code sent for: @${username}` : 'No session found.';

if (!username || !localStorage.getItem('zipchat_temp_token')) {
    window.location.href = 'index.html';
}

function getInputs() {
    return [...document.querySelectorAll('#otp-row input')];
}

function otpInput(e, idx) {
    const boxes = getInputs();
    const val   = e.target.value.replace(/\D/g, '');
    e.target.value = val;
    if (val && idx < 5) boxes[idx + 1].focus();
    if (idx === 5 && val) verifyOtp();
}

function otpKey(e, idx) {
    const boxes = getInputs();
    if (e.key === 'Backspace' && !boxes[idx].value && idx > 0) {
        boxes[idx - 1].focus();
    }
}

function getOtp() {
    return getInputs().map(i => i.value).join('');
}

function clearBoxes() {
    getInputs().forEach(i => i.value = '');
    getInputs()[0].focus();
}

function showBanner(msg) {
    const el = document.getElementById('banner');
    el.textContent = msg;
    el.classList.add('show');
}

async function verifyOtp() {
    const otp = getOtp();
    if (otp.length < 6) return showBanner('Enter all 6 digits.');

    const btn = document.getElementById('btn-verify');
    btn.disabled = true;
    btn.textContent = 'VERIFYING...';

    try {
        const res = await fetch(`${AUTH}/verify-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, otp })
        });

        if (!res.ok) {
            clearBoxes();
            return showBanner(await res.text());
        }

        const data = await res.json();
        localStorage.setItem('zipchat_token',        data.token);
        localStorage.setItem('zipchat_display_name', data.displayName);
        localStorage.removeItem('zipchat_temp_token');
        window.location.href = 'chatlist.html';

    } catch {
        showBanner('Cannot reach auth server. Is authserver.py running on port 3000?');
    } finally {
        btn.disabled = false;
        btn.textContent = 'VERIFY →';
    }
}

window.onload = () => getInputs()[0].focus();
</script>
</body>
</html>
