<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZipChat — Verify OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #08090c;
            --surface: #10131a;
            --border:  #1e2336;
            --accent:  #00e5ff;
            --accent2: #6c3fff;
            --text:    #dde3f0;
            --muted:   #4a5270;
            --red:     #ff4560;
            --yellow:  #ffd166;
            --mono:    'IBM Plex Mono', monospace;
            --sans:    'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none;
        }

        .card {
            position: relative; z-index: 1;
            width: 380px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 32px 32px;
            text-align: center;
            animation: rise 0.4s cubic-bezier(.16,1,.3,1);
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: var(--sans);
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(120deg, var(--accent), var(--accent2));
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .subtitle {
            font-family: var(--mono);
            font-size: 0.62rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 30px;
        }

        .shield { font-size: 2.4rem; margin-bottom: 14px; }

        h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }

        .desc {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 6px;
        }

        .user-hint {
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--yellow);
            margin-bottom: 24px;
        }

        .otp-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .otp-row input {
            width: 46px;
            height: 56px;
            text-align: center;
            font-family: var(--mono);
            font-size: 1.5rem;
            font-weight: 600;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--accent);
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        .otp-row input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
        }

        .banner {
            border-radius: 7px;
            padding: 9px 13px;
            font-family: var(--mono);
            font-size: 0.75rem;
            margin-bottom: 14px;
            display: none;
            text-align: left;
        }
        .banner.error { background: rgba(255,69,96,0.1); border: 1px solid rgba(255,69,96,0.3); color: var(--red); }
        .banner.show  { display: block; }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.18s;
            background: linear-gradient(120deg, var(--accent), #009ab8);
            color: #000;
        }
        .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        .btn-back {
            width: 100%;
            padding: 11px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.78rem;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.18s;
        }
        .btn-back:hover { border-color: var(--accent); color: var(--accent); }

        .footer {
            font-family: var(--mono);
            font-size: 0.62rem;
            color: var(--muted);
            margin-top: 24px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">⚡ ZipChat</div>
    <div class="subtitle">Two-Factor Authentication</div>

    <div class="shield">🔐</div>
    <h2>Enter your OTP</h2>
    <p class="desc">Check the <span style="color:var(--accent)">authserver.py terminal</span> for your 6-digit code.</p>
    <p class="user-hint" id="user-hint">Loading...</p>

    <div id="banner" class="banner error"></div>

    <div class="otp-row" id="otp-row">
        <input type="text" maxlength="1" inputmode="numeric" onkeydown="otpKey(event,0)" oninput="otpInput(event,0)">
        <input type="text" maxlength="1" inputmode="numeric" onkeydown="otpKey(event,1)" oninput="otpInput(event,1)">
        <input type="text" maxlength="1" inputmode="numeric" onkeydown="otpKey(event,2)" oninput="otpInput(event,2)">
        <input type="text" maxlength="1" inputmode="numeric" onkeydown="otpKey(event,3)" oninput="otpInput(event,3)">
        <input type="text" maxlength="1" inputmode="numeric" onkeydown="otpKey(event,4)" oninput="otpInput(event,4)">
        <input type="text" maxlength="1" inputmode="numeric" onkeydown="otpKey(event,5)" oninput="otpInput(event,5)">
    </div>

    <button class="btn" id="btn-verify" onclick="verifyOtp()">VERIFY →</button>
    <!-- FIX: back button should go to index.html, not welcome.html -->
    <button class="btn-back" onclick="window.location.href='index.html'">← BACK TO LOGIN</button>

    <div class="footer">© 2026 ZipChat</div>
</div>

<script>
const AUTH     = 'http://localhost:3000';
const username = localStorage.getItem('zipchat_username') || '';

document.getElementById('user-hint').textContent = username ? `Code for: @${username}` : 'No session found.';

// FIX: redirect to index.html
if (!username || !localStorage.getItem('zipchat_temp_token')) {
    window.location.href = 'index.html';
}

function otpInput(e, idx) {
    const boxes = document.querySelectorAll('#otp-row input');
    const val   = e.target.value.replace(/\D/g, '');
    e.target.value = val;
    if (val && idx < 5) boxes[idx + 1].focus();
    if (idx === 5 && val) verifyOtp();
}

function otpKey(e, idx) {
    const boxes = document.querySelectorAll('#otp-row input');
    if (e.key === 'Backspace' && !boxes[idx].value && idx > 0) {
        boxes[idx - 1].focus();
    }
}

function getOtp() {
    return [...document.querySelectorAll('#otp-row input')].map(i => i.value).join('');
}

function clearBoxes() {
    document.querySelectorAll('#otp-row input').forEach(i => i.value = '');
    document.querySelectorAll('#otp-row input')[0].focus();
}

function showBanner(msg) {
    const el = document.getElementById('banner');
    el.textContent = msg;
    el.classList.add('show');
}

async function verifyOtp() {
    const otp = getOtp();
    if (otp.length < 6) return showBanner('Enter all 6 digits.');

    const btn = document.getElementById('btn-verify');
    btn.disabled = true;
    btn.textContent = 'VERIFYING...';

    try {
        const res = await fetch(`${AUTH}/verify-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, otp })
        });

        if (!res.ok) {
            clearBoxes();
            return showBanner(await res.text());
        }

        const data = await res.json();

        localStorage.setItem('zipchat_token',        data.token);
        localStorage.setItem('zipchat_display_name', data.displayName);
        localStorage.removeItem('zipchat_temp_token');

        window.location.href = 'chatlist.html';

    } catch {
        showBanner('Cannot reach auth server. Is authserver.py running on port 3000?');
    } finally {
        btn.disabled = false;
        btn.textContent = 'VERIFY →';
    }
}

window.onload = () => document.querySelectorAll('#otp-row input')[0].focus();
</script>
</body>
</html>
